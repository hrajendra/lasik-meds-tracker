<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1e40af">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LASIK Meds">
  <title>LASIK Meds Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:    #1e40af;
      --blue-lt: #dbeafe;
      --bg:      #f1f5f9;
      --card:    #ffffff;
      --text:    #1e293b;
      --muted:   #64748b;
      --border:  #e2e8f0;
      --nav-h:   62px;
      --sit:     env(safe-area-inset-top, 0px);
      --sib:     env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }

    /* ── Header ── */
    .hdr {
      background: var(--blue);
      color: #fff;
      padding: 14px 18px calc(14px + 0px);
      padding-top: calc(14px + var(--sit));
    }
    .hdr-top { display: flex; justify-content: space-between; align-items: center; }
    .hdr h1  { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
    .day-pill {
      background: rgba(255,255,255,.2);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 12px;
      font-weight: 600;
    }
    .hdr-sub { font-size: 12px; opacity: .75; margin-top: 4px; }

    /* ── Scroll area ── */
    .main {
      padding: 14px 14px calc(var(--nav-h) + var(--sib) + 14px);
      overflow-y: auto;
    }

    /* ── Progress bar ── */
    .progress-card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .prog-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
    .prog-row strong { font-weight: 600; }
    .prog-track { background: var(--border); border-radius: 6px; height: 7px; }
    .prog-fill  { height: 7px; border-radius: 6px; background: #22c55e; transition: width .4s; }

    /* ── Section label ── */
    .sec-lbl {
      font-size: 11px; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: .06em; margin: 14px 0 7px 2px;
    }

    /* ── Dose card ── */
    .dose-card {
      background: var(--card);
      border-radius: 13px;
      padding: 13px 14px;
      margin-bottom: 9px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 11px;
      border-left-width: 4px;
    }
    .dose-card.is-next { box-shadow: 0 3px 12px rgba(30,64,175,.13); }
    .dose-card.is-taken  { opacity: .55; }
    .dose-card.is-skipped { opacity: .45; }
    .dose-card.is-past:not(.is-taken):not(.is-skipped) { opacity: .6; }

    .d-time {
      font-size: 14px; font-weight: 700;
      min-width: 54px; line-height: 1.2;
    }
    .d-time small { display: block; font-size: 10px; font-weight: 500; color: var(--muted); }

    .d-info { flex: 1; min-width: 0; }
    .d-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .d-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .d-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .btn-t, .btn-s {
      padding: 6px 11px;
      border-radius: 8px; border: none;
      font-size: 12px; font-weight: 700;
      cursor: pointer; transition: transform .1s;
    }
    .btn-t:active, .btn-s:active { transform: scale(.93); }
    .btn-t { background: #dcfce7; color: #15803d; }
    .btn-s { background: #fee2e2; color: #b91c1c; }

    .chip {
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .chip-t { background: #dcfce7; color: #15803d; }
    .chip-s { background: #fee2e2; color: #b91c1c; }

    /* ── Dolo as-needed ── */
    .dolo-card {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-left: 4px solid #f59e0b;
      border-radius: 13px;
      padding: 13px 14px;
      margin-bottom: 9px;
    }
    .dolo-card h3 { font-size: 14px; font-weight: 700; color: #92400e; }
    .dolo-card p  { font-size: 11px; color: #a16207; margin-top: 3px; }
    .dolo-row {
      display: flex; align-items: center;
      gap: 10px; margin-top: 10px;
    }
    .dolo-count { font-size: 22px; font-weight: 800; color: #92400e; }
    .dolo-unit  { font-size: 12px; color: #a16207; }
    .btn-dolo {
      background: #f59e0b; color: #fff;
      border: none; border-radius: 8px;
      padding: 7px 14px; font-size: 13px; font-weight: 700;
      cursor: pointer; margin-left: auto;
    }
    .btn-dolo:disabled { opacity: .4; cursor: not-allowed; }
    .btn-undo {
      background: none; border: none;
      color: #a16207; font-size: 12px;
      text-decoration: underline; cursor: pointer;
    }

    /* ── Notif permission ── */
    .perm-card {
      background: linear-gradient(135deg, #1e40af, #3b82f6);
      color: #fff; border-radius: 14px;
      padding: 15px 16px; margin-bottom: 12px;
    }
    .perm-card h3 { font-size: 15px; margin-bottom: 5px; }
    .perm-card p  { font-size: 12px; opacity: .9; margin-bottom: 11px; }
    .btn-perm {
      background: #fff; color: #1e40af;
      border: none; border-radius: 9px;
      padding: 8px 18px; font-size: 13px; font-weight: 700;
      cursor: pointer;
    }
    .warn-card {
      background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: 12px; padding: 11px 14px;
      font-size: 12px; color: #9a3412;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .warn-card button {
      margin-left: auto; background: none; border: none;
      color: #9a3412; font-size: 18px; cursor: pointer; line-height: 1;
    }

    /* ── Bottom nav ── */
    .nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--sib);
      z-index: 200;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 9px 0;
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 10px; font-weight: 600; gap: 3px;
      transition: color .15s;
    }
    .nav-btn.active { color: var(--blue); }
    .nav-btn svg { width: 22px; height: 22px; }

    /* ── Views ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── Schedule view ── */
    .sched-card {
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 13px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .sched-hdr {
      padding: 12px 15px;
      display: flex; align-items: center; gap: 10px;
    }
    .sched-hdr .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .sched-hdr h3 { font-size: 14px; font-weight: 700; flex: 1; }
    .sched-hdr .badge {
      font-size: 11px; padding: 3px 9px;
      border-radius: 20px; font-weight: 600;
    }
    .sched-row {
      padding: 10px 15px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start; gap: 8px;
    }
    .sched-row-lbl { font-size: 12px; color: var(--muted); flex-shrink: 0; padding-top: 1px; }
    .sched-row-times { font-size: 12px; font-weight: 600; text-align: right; line-height: 1.6; }
    .sched-row.active-week { background: #f0f9ff; }

    /* ── History view ── */
    .hist-day {
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .hist-hdr {
      padding: 12px 15px;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer;
    }
    .hist-hdr h3 { font-size: 14px; font-weight: 600; }
    .hist-meta { display: flex; align-items: center; gap: 8px; }
    .hist-count { font-size: 12px; color: var(--muted); }
    .adh-pill {
      font-size: 11px; font-weight: 700;
      padding: 3px 9px; border-radius: 20px;
    }
    .adh-hi  { background: #dcfce7; color: #15803d; }
    .adh-mid { background: #fef3c7; color: #92400e; }
    .adh-lo  { background: #fee2e2; color: #b91c1c; }
    .adh-na  { background: var(--border); color: var(--muted); }
    .hist-body { padding: 0 15px 12px; display: none; }
    .hist-med-lbl { font-size: 11px; font-weight: 700; margin: 10px 0 4px; }
    .hist-dose-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 0; border-top: 1px solid var(--border);
      font-size: 12px;
    }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); }
    .empty .ico { font-size: 44px; margin-bottom: 10px; }
    .empty p { font-size: 14px; line-height: 1.5; }

    /* ── Install hint ── */
    .install-hint {
      background: #f0fdf4; border: 1px solid #bbf7d0;
      border-radius: 12px; padding: 11px 14px;
      font-size: 12px; color: #15803d;
      margin-bottom: 12px; line-height: 1.5;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-top">
      <h1>👁 LASIK Meds</h1>
      <span class="day-pill" id="dayPill">Day 1</span>
    </div>
    <div class="hdr-sub" id="hdrSub">Himateja · Loading…</div>
  </header>

  <!-- MAIN SCROLL -->
  <div class="main">

    <!-- TODAY -->
    <div class="view active" id="view-today">
      <div id="notifArea"></div>
      <div id="todayProgress"></div>
      <div id="todayDoses"></div>
      <div id="todayDolo"></div>
    </div>

    <!-- SCHEDULE -->
    <div class="view" id="view-schedule">
      <div id="scheduleContent"></div>
    </div>

    <!-- HISTORY -->
    <div class="view" id="view-history">
      <div id="historyContent"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav class="nav">
    <button class="nav-btn active" id="tab-today" onclick="switchTab('today')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <circle cx="12" cy="12" r="4"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="5" y2="12"/>
        <line x1="19" y1="12" x2="22" y2="12"/>
        <line x1="4.9" y1="4.9" x2="7.1" y2="7.1"/>
        <line x1="16.9" y1="16.9" x2="19.1" y2="19.1"/>
        <line x1="4.9" y1="19.1" x2="7.1" y2="16.9"/>
        <line x1="16.9" y1="7.1" x2="19.1" y2="4.9"/>
      </svg>
      Today
    </button>
    <button class="nav-btn" id="tab-schedule" onclick="switchTab('schedule')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <rect x="3" y="4" width="18" height="18" rx="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8"  y1="2" x2="8"  y2="6"/>
        <line x1="3"  y1="10" x2="21" y2="10"/>
      </svg>
      Schedule
    </button>
    <button class="nav-btn" id="tab-history" onclick="switchTab('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      History
    </button>
  </nav>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const SURGERY_DATE = new Date('2026-05-15T00:00:00'); // IST midnight
const PATIENT = 'Himateja';

const MEDS = [
  {
    id: 'fml', name: 'Fluorometholone (FML)', short: 'FML',
    type: 'drops', color: '#ef4444', bg: '#fef2f2',
    schedule: [
      { ds: 1, de: 7,  times: ['07:30','11:30','15:30','19:30'] },
      { ds: 8, de: 14, times: ['07:30','13:30','15:30'] },
      { ds:15, de: 21, times: ['07:30','19:30'] },
      { ds:22, de: 28, times: ['07:30'] },
    ]
  },
  {
    id: 'moxi', name: 'Moxifloxacin', short: 'Moxi',
    type: 'drops', color: '#8b5cf6', bg: '#f5f3ff',
    schedule: [
      { ds: 1, de: 7, times: ['07:00','10:00','13:00','16:00','19:00','22:00'] },
    ]
  },
  {
    id: 'ascon', name: 'Ascon PF / PEG', short: 'Ascon PF',
    type: 'drops', color: '#3b82f6', bg: '#eff6ff',
    schedule: [
      { ds: 0, de: 30, times: ['07:00','08:00','09:00','10:00','11:00','12:00',
                                '13:00','14:00','15:00','16:00','17:00','18:00'] },
    ]
  },
  {
    id: 'omega3', name: 'Omega-3 (Eye-360)', short: 'Omega-3',
    type: 'tablet', color: '#22c55e', bg: '#f0fdf4',
    schedule: [
      { ds: 0, de: 30, times: ['09:00'] },
    ]
  }
];

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function dayOffset(date) {
  const a = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const b = new Date(SURGERY_DATE.getFullYear(), SURGERY_DATE.getMonth(), SURGERY_DATE.getDate());
  return Math.round((a - b) / 86400000);
}

function dateStr(date) {
  return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function fmt12(t24) {
  const [h, m] = t24.split(':').map(Number);
  return `${h%12||12}:${pad(m)} ${h>=12?'PM':'AM'}`;
}

function nowStr() {
  const n = new Date();
  return `${pad(n.getHours())}:${pad(n.getMinutes())}`;
}

function fmtDate(d) {
  return d.toLocaleDateString('en-IN', {weekday:'long', day:'numeric', month:'long'});
}

function getDoses(date) {
  const off = dayOffset(date);
  const out = [];
  MEDS.forEach(med => {
    med.schedule.forEach(slot => {
      if (off >= slot.ds && off <= slot.de) {
        slot.times.forEach(t => out.push({ id:`${med.id}_${t}`, medId:med.id, med, time:t }));
      }
    });
  });
  return out.sort((a,b) => a.time.localeCompare(b.time));
}

function getStatus(ds, medId, time) { return localStorage.getItem(`s_${ds}_${medId}_${time}`); }
function setStatus(ds, medId, time, v) { localStorage.setItem(`s_${ds}_${medId}_${time}`, v); }
function getDoloCount(ds) { return parseInt(localStorage.getItem(`dolo_${ds}`)||'0'); }
function setDoloCount(ds, n) { localStorage.setItem(`dolo_${ds}`, n); }

// ═══════════════════════════════════════════════════════════
// TODAY VIEW
// ═══════════════════════════════════════════════════════════
const viewDate = new Date();

function renderToday() {
  const ds   = dateStr(viewDate);
  const off  = dayOffset(viewDate);
  const now  = nowStr();
  const doses = getDoses(viewDate);

  // Header
  document.getElementById('dayPill').textContent = `Day ${off}`;
  document.getElementById('hdrSub').textContent  = `${PATIENT} · ${fmtDate(viewDate)}`;

  // Progress
  const taken = doses.filter(d => getStatus(ds,d.medId,d.time)==='taken').length;
  const total = doses.length;
  const pct   = total ? Math.round(taken/total*100) : 0;
  document.getElementById('todayProgress').innerHTML = `
    <div class="progress-card">
      <div class="prog-row"><span>Today's progress</span><strong>${taken} / ${total} taken</strong></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;

  // Notification area
  renderNotifArea();

  // Dose list
  const past     = doses.filter(d => d.time < now);
  const upcoming = doses.filter(d => d.time >= now);
  const pendingUp = upcoming.filter(d => !getStatus(ds,d.medId,d.time));
  const nextTime  = pendingUp.length ? pendingUp[0].time : null;

  let html = '';

  if (past.length) {
    html += `<div class="sec-lbl">Earlier today</div>`;
    past.forEach(d => { html += doseCard(d, ds, 'past', false); });
  }
  if (upcoming.length) {
    html += `<div class="sec-lbl">Upcoming</div>`;
    upcoming.forEach(d => {
      const isNext = d.time === nextTime && !getStatus(ds,d.medId,d.time);
      html += doseCard(d, ds, 'upcoming', isNext);
    });
  }
  if (!doses.length) {
    html = `<div class="empty"><div class="ico">🎉</div><p>No scheduled doses today.<br>Recovery period complete!</p></div>`;
  }

  document.getElementById('todayDoses').innerHTML = html;
  renderDolo(ds);
}

function doseCard(dose, ds, period, isNext) {
  const status = getStatus(ds, dose.medId, dose.time);
  const med    = dose.med;
  const isPast = period === 'past';

  let cls = 'dose-card';
  if (status === 'taken')  cls += ' is-taken';
  if (status === 'skipped') cls += ' is-skipped';
  if (isPast && !status)   cls += ' is-past';
  if (isNext && !status)   cls += ' is-next';

  const typeLabel = med.type==='drops' ? '💧 Eye drops · both eyes' : '💊 Tablet · after meals';

  let actions;
  if (status) {
    const chip = status==='taken'
      ? `<span class="chip chip-t">✓ Taken</span>`
      : `<span class="chip chip-s">✗ Skipped</span>`;
    // allow undo
    actions = `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      ${chip}
      <button onclick="undoDose('${ds}','${dose.medId}','${dose.time}')"
        style="background:none;border:none;font-size:10px;color:var(--muted);text-decoration:underline;cursor:pointer">undo</button>
    </div>`;
  } else {
    actions = `<div class="d-actions">
      <button class="btn-t" onclick="markDose('${ds}','${dose.medId}','${dose.time}','taken')">✓</button>
      <button class="btn-s" onclick="markDose('${ds}','${dose.medId}','${dose.time}','skipped')">✗</button>
    </div>`;
  }

  return `<div class="${cls}" style="border-left-color:${med.color}">
    <div class="d-time">${fmt12(dose.time)}</div>
    <div class="d-info">
      <div class="d-name">${med.short}</div>
      <div class="d-sub">${typeLabel}</div>
    </div>
    ${actions}
  </div>`;
}

function markDose(ds, medId, time, status) {
  setStatus(ds, medId, time, status);
  renderToday();
  scheduleNotifications();
}

function undoDose(ds, medId, time) {
  localStorage.removeItem(`s_${ds}_${medId}_${time}`);
  renderToday();
  scheduleNotifications();
}

function renderDolo(ds) {
  const count = getDoloCount(ds);
  const maxed = count >= 2;
  document.getElementById('todayDolo').innerHTML = `
    <div class="sec-lbl">As needed</div>
    <div class="dolo-card">
      <h3>💊 Dolo 650 / Ultracet</h3>
      <p>Pain relief only · max 2× per day</p>
      <div class="dolo-row">
        <span class="dolo-count">${count}</span>
        <span class="dolo-unit">taken today</span>
        <button class="btn-dolo" onclick="logDolo('${ds}')" ${maxed?'disabled':''}>
          ${maxed ? 'Max reached' : '+ Log dose'}
        </button>
        ${count > 0 ? `<button class="btn-undo" onclick="undoDolo('${ds}')">undo</button>` : ''}
      </div>
    </div>`;
}

function logDolo(ds) {
  const c = getDoloCount(ds);
  if (c < 2) { setDoloCount(ds, c+1); renderDolo(ds); }
}
function undoDolo(ds) {
  const c = getDoloCount(ds);
  if (c > 0) { setDoloCount(ds, c-1); renderDolo(ds); }
}

// ═══════════════════════════════════════════════════════════
// SCHEDULE VIEW
// ═══════════════════════════════════════════════════════════
function renderSchedule() {
  const off = dayOffset(new Date());
  let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:12px">
    Surgery: May 15, 2026 · ${PATIENT} · Both eyes</div>`;

  MEDS.forEach(med => {
    const typeLabel = med.type==='drops' ? '💧 Drops' : '💊 Tablet';
    html += `<div class="sched-card">
      <div class="sched-hdr" style="background:${med.bg}">
        <div class="dot" style="background:${med.color}"></div>
        <h3>${med.name}</h3>
        <span class="badge" style="background:${med.color}22;color:${med.color}">${typeLabel}</span>
      </div>`;

    if (med.id === 'ascon') {
      html += `<div class="sched-row ${off>=0&&off<=30?'active-week':''}">
        <span class="sched-row-lbl">May 15 – Jun 14</span>
        <span class="sched-row-times">Hourly · 12×/day<br>
          <span style="font-size:10px;color:var(--muted)">7 AM → 6 PM</span></span>
      </div>`;
    } else if (med.id === 'omega3') {
      html += `<div class="sched-row ${off>=0&&off<=30?'active-week':''}">
        <span class="sched-row-lbl">May 15 – Jun 14</span>
        <span class="sched-row-times">9:00 AM · after meals</span>
      </div>`;
    } else {
      med.schedule.forEach(slot => {
        const sd = new Date(SURGERY_DATE); sd.setDate(sd.getDate() + slot.ds);
        const ed = new Date(SURGERY_DATE); ed.setDate(ed.getDate() + slot.de);
        const wk = Math.ceil(slot.ds / 7);
        const lbl = `Wk ${wk} · ${sd.toLocaleDateString('en-IN',{month:'short',day:'numeric'})}–${ed.toLocaleDateString('en-IN',{month:'short',day:'numeric'})}`;
        const times = slot.times.map(fmt12).join(' · ');
        const active = off >= slot.ds && off <= slot.de;
        html += `<div class="sched-row ${active?'active-week':''}">
          <span class="sched-row-lbl">${lbl}</span>
          <span class="sched-row-times">${times}</span>
        </div>`;
      });
    }
    html += `</div>`;
  });

  // Dolo
  html += `<div class="sched-card">
    <div class="sched-hdr" style="background:#fffbeb">
      <div class="dot" style="background:#f59e0b"></div>
      <h3>Dolo 650 / Ultracet</h3>
      <span class="badge" style="background:#fde68a;color:#92400e">💊 As Needed</span>
    </div>
    <div class="sched-row">
      <span class="sched-row-lbl">Only if pain</span>
      <span class="sched-row-times">Max 2× per day</span>
    </div>
  </div>`;

  document.getElementById('scheduleContent').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// HISTORY VIEW
// ═══════════════════════════════════════════════════════════
function renderHistory() {
  const today = new Date();
  const todayOff = dayOffset(today);
  let html = '';

  for (let i = todayOff; i >= Math.max(0, todayOff - 13); i--) {
    const d = new Date(SURGERY_DATE);
    d.setDate(d.getDate() + i);
    const ds = dateStr(d);
    const doses = getDoses(d);
    if (!doses.length) continue;

    const taken   = doses.filter(x => getStatus(ds,x.medId,x.time)==='taken').length;
    const skipped = doses.filter(x => getStatus(ds,x.medId,x.time)==='skipped').length;
    const logged  = taken + skipped;
    const total   = doses.length;
    const pct     = logged ? Math.round(taken/logged*100) : null;

    let adh, adhCls;
    if (pct === null)     { adh='—';       adhCls='adh-na'; }
    else if (pct >= 80)  { adh=`${pct}%`; adhCls='adh-hi'; }
    else if (pct >= 50)  { adh=`${pct}%`; adhCls='adh-mid'; }
    else                 { adh=`${pct}%`; adhCls='adh-lo'; }

    const label = i===todayOff ? 'Today' : `Day ${i} · ${d.toLocaleDateString('en-IN',{weekday:'short',month:'short',day:'numeric'})}`;
    const doloC = getDoloCount(ds);

    html += `<div class="hist-day">
      <div class="hist-hdr" onclick="toggleHist('h${i}')">
        <h3>${label}</h3>
        <div class="hist-meta">
          <span class="hist-count">${taken}/${total}</span>
          <span class="adh-pill ${adhCls}">${adh}</span>
          <span style="color:var(--muted)">›</span>
        </div>
      </div>
      <div class="hist-body" id="h${i}">`;

    // Group by med
    const byMed = {};
    doses.forEach(d2 => { (byMed[d2.medId] = byMed[d2.medId]||[]).push(d2); });
    Object.values(byMed).forEach(mDoses => {
      const med = mDoses[0].med;
      html += `<div class="hist-med-lbl" style="color:${med.color}">${med.short}</div>`;
      mDoses.forEach(d2 => {
        const st = getStatus(ds, d2.medId, d2.time);
        const chip = st==='taken'   ? `<span class="chip chip-t">✓</span>`
                   : st==='skipped' ? `<span class="chip chip-s">✗</span>`
                   : `<span style="font-size:11px;color:var(--muted)">—</span>`;
        html += `<div class="hist-dose-row"><span>${fmt12(d2.time)}</span>${chip}</div>`;
      });
    });

    if (doloC > 0) {
      html += `<div style="margin-top:8px;font-size:12px;color:#a16207">💊 Dolo: ${doloC}× taken</div>`;
    }

    html += `</div></div>`;
  }

  if (!html) {
    html = `<div class="empty"><div class="ico">📋</div><p>No history yet.<br>Start tracking today!</p></div>`;
  }
  document.getElementById('historyContent').innerHTML = html;
}

function toggleHist(id) {
  const el = document.getElementById(id);
  el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

// ═══════════════════════════════════════════════════════════
// NOTIFICATIONS
// ═══════════════════════════════════════════════════════════
function renderNotifArea() {
  const area = document.getElementById('notifArea');
  if (!('Notification' in window)) {
    area.innerHTML = `<div class="warn-card">⚠️ Notifications not supported in this browser.</div>`;
    return;
  }
  if (Notification.permission === 'denied') {
    area.innerHTML = `<div class="warn-card">🔕 Notifications blocked. Enable in Settings to get alarms.
      <button onclick="this.closest('.warn-card').remove()">×</button></div>`;
  } else if (Notification.permission === 'default') {
    area.innerHTML = `<div class="perm-card">
      <h3>🔔 Enable dose alarms</h3>
      <p>Get notified 5 min before each dose and right at dose time.</p>
      <button class="btn-perm" onclick="requestNotif()">Enable notifications</button>
    </div>`;
  } else {
    // Granted – show install hint if not standalone
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
    if (!isStandalone) {
      area.innerHTML = `<div class="install-hint">
        📲 <strong>Install for reliable alarms:</strong><br>
        iOS: Share → Add to Home Screen<br>
        Android: Menu → Add to Home Screen
      </div>`;
    } else {
      area.innerHTML = '';
    }
    scheduleNotifications();
  }
}

async function requestNotif() {
  const perm = await Notification.requestPermission();
  renderNotifArea();
  if (perm === 'granted') scheduleNotifications();
}

const timers = [];

function scheduleNotifications() {
  if (Notification.permission !== 'granted') return;
  timers.forEach(clearTimeout);
  timers.length = 0;

  const today = new Date();
  const ds    = dateStr(today);
  const now   = new Date();
  const doses = getDoses(today);

  doses.forEach(dose => {
    if (getStatus(ds, dose.medId, dose.time)) return;
    const [h, m] = dose.time.split(':').map(Number);
    const doseTime = new Date(); doseTime.setHours(h, m, 0, 0);
    const ms = doseTime - now;
    if (ms <= 0 || ms > 86400000) return;

    const send = (isWarning) => {
      const msg = { type:'SHOW_NOTIFICATION',
        medName: dose.med.short,
        timeStr: fmt12(dose.time),
        tag: `${dose.medId}_${dose.time}${isWarning?'_w':''}`,
        isWarning };
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage(msg);
      } else {
        new Notification(isWarning ? `⏰ ${dose.med.short} in 5 min` : `💧 ${dose.med.short}`,{
          body: isWarning ? `Upcoming: ${fmt12(dose.time)}` : `${fmt12(dose.time)} · Both eyes`,
          icon:'icon-192.png', tag: msg.tag, requireInteraction: !isWarning
        });
      }
    };

    // 5-min warning
    if (ms > 5*60*1000) {
      timers.push(setTimeout(() => send(true), ms - 5*60*1000));
    }
    // Dose time
    timers.push(setTimeout(() => send(false), ms));
  });
}

// ═══════════════════════════════════════════════════════════
// NAV
// ═══════════════════════════════════════════════════════════
function switchTab(tab) {
  ['today','schedule','history'].forEach(t => {
    document.getElementById(`view-${t}`).classList.toggle('active', t===tab);
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
  });
  if (tab==='today')    renderToday();
  if (tab==='schedule') renderSchedule();
  if (tab==='history')  renderHistory();
}

// ═══════════════════════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('SW registered'))
    .catch(e => console.warn('SW error', e));
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
renderToday();
renderSchedule(); // pre-render for instant tab switch

// Refresh today view every minute (next-dose highlight, progress)
setInterval(() => {
  if (document.getElementById('view-today').classList.contains('active')) renderToday();
}, 60000);
</script>
