<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LASIK Meds · Himateja</title>
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#1565c0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LASIK Meds" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --primary: #1565c0;
      --primary-light: #e3f2fd;
      --text: #1a202c;
      --text-sub: #64748b;
      --border: #e2e8f0;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --taken: #16a34a;
      --taken-bg: #f0fdf4;
      --skip-col: #dc2626;
      --nav-h: 64px;
      --header-h: 60px;
    }

    html { font-size: 16px; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    #app { display: flex; flex-direction: column; min-height: 100dvh; }

    /* === HEADER === */
    header {
      background: var(--primary);
      color: white;
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(21,101,192,0.3);
    }
    .header-title { font-size: 1rem; font-weight: 700; letter-spacing: -0.01em; }
    .header-sub { font-size: 0.72rem; opacity: 0.75; margin-top: 1px; }

    #notif-btn {
      background: rgba(255,255,255,0.15);
      border: none; color: white;
      width: 38px; height: 38px;
      border-radius: 50%;
      cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #notif-btn:hover { background: rgba(255,255,255,0.25); }
    #notif-btn.on { background: rgba(255,255,255,0.3); }

    /* === MAIN === */
    main {
      flex: 1;
      overflow-y: auto;
      padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom));
    }

    /* === BOTTOM NAV === */
    nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: calc(var(--nav-h) + env(safe-area-inset-bottom));
      background: var(--card);
      border-top: 1px solid var(--border);
      display: flex; z-index: 100;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .tab-btn {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      border: none; background: none;
      cursor: pointer; color: var(--text-sub);
      font-size: 0.68rem; font-weight: 600;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn .ti { font-size: 1.3rem; }
    .tab-btn.active { color: var(--primary); }

    /* === TODAY HEADER === */
    .today-hdr {
      background: var(--card);
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      position: sticky; top: var(--header-h); z-index: 90;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .date-nav {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .arrow-btn {
      width: 36px; height: 36px;
      border: 1px solid var(--border); background: var(--card);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 1.2rem; color: var(--text-sub);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .arrow-btn:hover:not(:disabled) { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .arrow-btn:disabled { opacity: 0.25; cursor: default; }

    .date-ctr { text-align: center; }
    .date-main {
      font-size: 1rem; font-weight: 700; color: var(--text);
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .badge-today {
      font-size: 0.62rem; background: var(--primary); color: white;
      padding: 2px 7px; border-radius: 20px; font-weight: 700;
    }
    .date-sub { font-size: 0.73rem; color: var(--text-sub); margin-top: 3px; }
    .week-pill {
      display: inline-block;
      background: var(--primary-light); color: var(--primary);
      font-weight: 700; padding: 1px 9px; border-radius: 20px;
    }

    .prog-row { display: flex; align-items: center; gap: 10px; }
    .prog-track {
      flex: 1; height: 6px;
      background: var(--border); border-radius: 3px; overflow: hidden;
    }
    .prog-fill {
      height: 100%; background: var(--taken);
      border-radius: 3px; transition: width 0.4s ease;
    }
    .prog-text { font-size: 0.72rem; color: var(--text-sub); white-space: nowrap; }

    /* === DOSE LIST === */
    .dose-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

    .dose-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 11px 12px 11px 14px;
      border-left: 4px solid transparent;
      box-shadow: var(--shadow);
      display: flex; align-items: center; gap: 12px;
      transition: opacity 0.2s, box-shadow 0.2s;
    }
    .dose-card.taken { background: var(--taken-bg); opacity: 0.7; }
    .dose-card.skipped { opacity: 0.45; }
    .dose-card.is-next { box-shadow: 0 4px 18px rgba(21,101,192,0.22); }

    .dose-time-col { min-width: 46px; text-align: center; }
    .dose-time { font-size: 0.88rem; font-weight: 700; font-variant-numeric: tabular-nums; }
    .tiny-badge {
      font-size: 0.56rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.03em;
      padding: 2px 5px; border-radius: 4px;
      margin-top: 3px; display: inline-block;
    }
    .b-next  { background: #dbeafe; color: #1d4ed8; }
    .b-late  { background: #fee2e2; color: #dc2626; }
    .b-done  { background: #dcfce7; color: #16a34a; }

    .dose-info { flex: 1; min-width: 0; }
    .dose-name { font-size: 0.88rem; font-weight: 600; }
    .dose-type { font-size: 0.7rem; font-weight: 500; margin-top: 1px; }

    .dose-actions { display: flex; gap: 5px; flex-shrink: 0; }

    .btn-take {
      padding: 6px 12px; border-radius: 8px; border: none;
      font-size: 0.78rem; font-weight: 700;
      cursor: pointer; background: var(--primary); color: white;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-take:hover { background: #1e40af; }

    .btn-taken {
      padding: 6px 12px; border-radius: 8px;
      border: 2px solid var(--taken);
      font-size: 0.78rem; font-weight: 700;
      cursor: pointer; background: transparent; color: var(--taken);
      -webkit-tap-highlight-color: transparent;
    }

    .btn-skip {
      padding: 6px 9px; border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.78rem; font-weight: 500;
      cursor: pointer; background: transparent; color: var(--text-sub);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-skip:hover { border-color: var(--skip-col); color: var(--skip-col); }

    .btn-skipped {
      padding: 6px 9px; border-radius: 8px;
      border: 2px solid var(--skip-col);
      font-size: 0.78rem; font-weight: 700;
      cursor: pointer; background: transparent; color: var(--skip-col);
      -webkit-tap-highlight-color: transparent;
    }

    /* === DOLO === */
    .section-lbl {
      padding: 10px 16px 4px;
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-sub);
    }
    .dolo-wrap { padding: 0 16px 8px; }
    .dolo-card {
      background: #fff8f0;
      border: 1px solid #fed7aa;
      border-left: 4px solid #f57c00;
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
    }
    .dolo-name { font-size: 0.85rem; font-weight: 700; color: #92400e; }
    .dolo-note { font-size: 0.7rem; color: #b45309; margin-top: 2px; }
    .btn-dolo {
      padding: 6px 12px; border-radius: 8px;
      border: 1.5px solid #f57c00;
      background: transparent; color: #f57c00;
      font-size: 0.78rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-dolo:disabled { opacity: 0.35; cursor: not-allowed; }

    /* === BANNERS === */
    .notif-banner {
      margin: 12px 16px 0;
      background: var(--primary-light); border: 1px solid #bfdbfe;
      border-radius: var(--radius); padding: 10px 14px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 10px;
    }
    .notif-banner p { font-size: 0.78rem; color: #1e40af; line-height: 1.4; }
    .btn-enable {
      padding: 6px 14px; border-radius: 8px;
      background: var(--primary); color: white;
      border: none; font-size: 0.78rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .ios-banner {
      margin: 8px 16px 0;
      background: #fefce8; border: 1px solid #fde68a;
      border-radius: var(--radius); padding: 9px 14px;
      font-size: 0.73rem; color: #78350f; line-height: 1.5;
    }

    /* === EMPTY === */
    .empty {
      text-align: center; padding: 56px 24px;
      color: var(--text-sub); font-size: 0.9rem; line-height: 1.7;
    }
    .empty .ei { font-size: 2.8rem; margin-bottom: 12px; }

    /* === SCHEDULE === */
    .sched-list { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .sched-card {
      background: var(--card); border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow);
      border-left: 4px solid transparent;
    }
    .sched-hdr {
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .sched-mname { font-size: 0.9rem; font-weight: 700; }
    .sched-mtype { font-size: 0.7rem; font-weight: 600; opacity: 0.8; }
    .sched-row {
      padding: 8px 14px; border-top: 1px solid rgba(0,0,0,0.05);
      display: flex; align-items: baseline; gap: 10px;
    }
    .sched-period {
      font-size: 0.75rem; font-weight: 700; color: var(--text-sub);
      min-width: 115px; flex-shrink: 0;
    }
    .sched-times { font-size: 0.8rem; color: var(--text); line-height: 1.5; }
    .sched-stop { color: var(--taken); font-weight: 700; }

    /* === HISTORY === */
    .hist-list { padding: 16px; display: flex; flex-direction: column; gap: 8px; }

    .stat-card {
      background: var(--card); border-radius: var(--radius);
      padding: 14px 16px; box-shadow: var(--shadow);
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 4px;
    }
    .stat-lbl { font-size: 0.7rem; color: var(--text-sub); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
    .stat-val { font-size: 1.6rem; font-weight: 800; color: var(--taken); margin-top: 3px; }
    .stat-detail { font-size: 0.82rem; color: var(--text-sub); text-align: right; line-height: 1.6; }

    .hist-card {
      background: var(--card); border-radius: var(--radius);
      padding: 12px 14px; box-shadow: var(--shadow);
      cursor: pointer; transition: box-shadow 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .hist-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .hist-top {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }
    .hist-date { font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .hist-pct { font-size: 0.9rem; font-weight: 800; color: var(--taken); }
    .hist-bar-wrap {
      height: 7px; background: var(--border);
      border-radius: 4px; overflow: hidden;
      display: flex; margin-bottom: 7px;
    }
    .hb-taken { background: var(--taken); }
    .hb-skip  { background: var(--skip-col); opacity: 0.6; }
    .hist-stats { display: flex; gap: 12px; flex-wrap: wrap; }
    .hs { font-size: 0.7rem; color: var(--text-sub); }
    .hs.t { color: var(--taken); font-weight: 700; }
    .hs.s { color: var(--skip-col); }
    .hs.ml { margin-left: auto; }

    @media (min-width: 640px) {
      .dose-list, .sched-list, .hist-list { max-width: 620px; margin: 0 auto; }
      .today-hdr { max-width: 620px; margin: 0 auto; position: static; }
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div>
      <div class="header-title">👁 LASIK Meds</div>
      <div class="header-sub">Himateja · Smart Vision Hospital</div>
    </div>
    <button id="notif-btn" onclick="handleNotifBtn()" title="Notifications">🔕</button>
  </header>
  <main id="main"></main>
  <nav>
    <button class="tab-btn active" data-tab="today" onclick="switchTab('today')">
      <span class="ti">📋</span><span>Today</span>
    </button>
    <button class="tab-btn" data-tab="schedule" onclick="switchTab('schedule')">
      <span class="ti">📅</span><span>Schedule</span>
    </button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
      <span class="ti">📊</span><span>History</span>
    </button>
  </nav>
</div>

<script>
// ===================== CONFIG =====================
const SURGERY = '2026-05-15';
const OP_DATE_LABEL = 'May 15, 2026';

// ===================== MEDS =====================
const MEDS = [
  {
    id: 'fml', name: 'Fluorometholone', abbr: 'FML',
    type: 'Eye Drop · Both Eyes',
    color: '#c62828', bg: '#ffebee',
    schedule: [
      { kind: 'week', from: 1, to: 1, times: ['07:30','11:30','15:30','19:30'] },
      { kind: 'week', from: 2, to: 2, times: ['07:30','13:30','15:30'] },
      { kind: 'week', from: 3, to: 3, times: ['07:30','19:30'] },
      { kind: 'week', from: 4, to: 4, times: ['07:30'] },
    ]
  },
  {
    id: 'moxi', name: 'Moxifloxacin', abbr: 'Moxi',
    type: 'Eye Drop · Both Eyes',
    color: '#6a1b9a', bg: '#f3e5f5',
    schedule: [
      { kind: 'week', from: 1, to: 1, times: ['07:00','10:00','13:00','16:00','19:00','22:00'] },
    ]
  },
  {
    id: 'ascon', name: 'Aquim PF', abbr: 'Aquim PF',
    type: 'Lubricant Drop · Both Eyes',
    color: '#0277bd', bg: '#e1f5fe',
    schedule: [
      { kind: 'day', from: 1, to: 30, times: ['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00'] },
    ]
  },
  {
    id: 'omega', name: 'Omega-3 (Eye-360)', abbr: 'Omega-3',
    type: 'Tablet · After meals',
    color: '#2e7d32', bg: '#e8f5e9',
    schedule: [
      { kind: 'day', from: 1, to: 30, times: ['14:00'] },
    ]
  },
];

// ===================== STATE =====================
let tab = 'today';
let curDate = todayStr();
let doseLog = {}, doloLog = {};
let swReady = false;

// ===================== UTILS =====================
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function p2(n) { return String(n).padStart(2,'0'); }

function parseD(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}
function strD(d) {
  return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
}
function daysSince(dateStr) {
  return Math.round((parseD(dateStr) - parseD(SURGERY)) / 86400000);
}
function weekNum(days) {
  if (days <= 0) return 0;
  return Math.ceil(days / 7);
}
function fmtDate(str) {
  return parseD(str).toLocaleDateString('en-IN', { weekday: 'short', month: 'short', day: 'numeric' });
}

// ===================== DOSE LOGIC =====================
function dosesFor(dateStr) {
  const days = daysSince(dateStr);
  const wk = weekNum(days);
  if (days < 1) return [];
  const out = [];
  for (const med of MEDS) {
    for (const s of med.schedule) {
      const active = s.kind === 'week'
        ? (wk >= s.from && wk <= s.to)
        : (days >= s.from && days <= s.to);
      if (active) {
        for (const t of s.times) {
          const [h, m] = t.split(':').map(Number);
          const dt = parseD(dateStr); dt.setHours(h, m, 0, 0);
          out.push({
            id: `${med.id}__${dateStr}__${t}`,
            medId: med.id, medName: med.name,
            type: med.type, color: med.color,
            time: t, ts: dt.getTime(),
          });
        }
        break;
      }
    }
  }
  return out.sort((a,b) => a.time.localeCompare(b.time));
}

function getStatus(id) { return doseLog[id]?.status || null; }

function setStatus(id, status) {
  if (status === null) delete doseLog[id];
  else doseLog[id] = { status, at: Date.now() };
  persist();
}

function doloToday() { return doloLog[curDate] || []; }

function logDolo() {
  if (!doloLog[curDate]) doloLog[curDate] = [];
  if (doloLog[curDate].length >= 2) return;
  doloLog[curDate].push(Date.now());
  persist(); render();
}

// ===================== STORAGE =====================
function persist() {
  try {
    localStorage.setItem('lm_doses', JSON.stringify(doseLog));
    localStorage.setItem('lm_dolo',  JSON.stringify(doloLog));
  } catch(e) {}
}
function hydrate() {
  try {
    doseLog = JSON.parse(localStorage.getItem('lm_doses') || '{}');
    doloLog = JSON.parse(localStorage.getItem('lm_dolo')  || '{}');
  } catch(e) { doseLog = {}; doloLog = {}; }
}

// ===================== RENDER =====================
function render() {
  const main = document.getElementById('main');
  if (tab === 'today')    main.innerHTML = renderToday();
  else if (tab === 'schedule') main.innerHTML = renderSchedule();
  else                    main.innerHTML = renderHistory();

  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));

  const nb = document.getElementById('notif-btn');
  const granted = typeof Notification !== 'undefined' && Notification.permission === 'granted';
  nb.textContent = granted ? '🔔' : '🔕';
  nb.classList.toggle('on', granted);
}

// --- TODAY ---
function renderToday() {
  const days = daysSince(curDate);
  const wk   = weekNum(days);
  const doses = dosesFor(curDate);
  const isToday = curDate === todayStr();
  const now   = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();

  const taken   = doses.filter(d => getStatus(d.id) === 'taken').length;
  const skipped = doses.filter(d => getStatus(d.id) === 'skipped').length;
  const pct     = doses.length ? Math.round(taken / doses.length * 100) : 0;

  let wkLabel = '';
  if (days === 0) wkLabel = 'Surgery Day';
  else if (days < 0) wkLabel = 'Pre-surgery';
  else if (wk >= 1 && wk <= 4) wkLabel = `Week ${wk} of 4`;
  else if (days > 0 && days <= 30) wkLabel = 'Month 1';
  else wkLabel = 'Treatment complete ✓';

  const minDate = new Date(parseD(SURGERY).getTime() + 86400000);
  const prevOk  = parseD(curDate) > minDate;
  const nextOk  = !isToday;

  let html = `
    <div class="today-hdr">
      <div class="date-nav">
        <button class="arrow-btn" onclick="chgDate(-1)" ${!prevOk ? 'disabled' : ''}>‹</button>
        <div class="date-ctr">
          <div class="date-main">
            ${fmtDate(curDate)}
            ${isToday ? '<span class="badge-today">Today</span>' : ''}
          </div>
          <div class="date-sub">
            Op: ${OP_DATE_LABEL} &nbsp;·&nbsp;
            <span class="week-pill">${wkLabel}</span>
          </div>
        </div>
        <button class="arrow-btn" onclick="chgDate(1)" ${!nextOk ? 'disabled' : ''}>›</button>
      </div>
  `;

  if (doses.length > 0) {
    html += `
      <div class="prog-row">
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div>
        <div class="prog-text">${taken}/${doses.length} &nbsp;·&nbsp; ${pct}%</div>
      </div>`;
  }

  html += `</div>`;

  // Notification nudge
  if (typeof Notification !== 'undefined' && Notification.permission === 'default') {
    html += `
      <div class="notif-banner">
        <p>Enable notifications to get reminders for each dose.</p>
        <button class="btn-enable" onclick="handleNotifBtn()">Enable</button>
      </div>`;
  }

  // iOS install hint
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) && !navigator.standalone;
  if (isIOS) {
    html += `<div class="ios-banner">📲 Install: tap Share → "Add to Home Screen" for background notifications.</div>`;
  }

  if (days < 1) {
    return html + `<div class="empty"><div class="ei">🏥</div>Surgery day drops are managed by the clinic.<br>Tracking starts May 16.</div>`;
  }
  if (doses.length === 0) {
    return html + `<div class="empty"><div class="ei">✅</div>No medications today.</div>`;
  }

  // Next upcoming dose
  let nextId = null;
  if (isToday) {
    const nd = doses.find(d => {
      const [h,m] = d.time.split(':').map(Number);
      return (h*60+m) > nowMin && !getStatus(d.id);
    });
    nextId = nd?.id;
  }

  html += `<div class="dose-list">`;
  for (const dose of doses) {
    const st = getStatus(dose.id);
    const [h, m] = dose.time.split(':').map(Number);
    const isPast = isToday && (h*60+m) < nowMin;
    const isNext = dose.id === nextId;

    let cls = 'dose-card';
    if (st === 'taken') cls += ' taken';
    if (st === 'skipped') cls += ' skipped';
    if (isNext) cls += ' is-next';

    let badge = '';
    if (isNext) badge = `<span class="tiny-badge b-next">Next</span>`;
    else if (isPast && !st) badge = `<span class="tiny-badge b-late">Late</span>`;
    else if (st === 'taken') badge = `<span class="tiny-badge b-done">Done</span>`;

    let acts = '';
    if (st === 'taken') {
      acts = `<button class="btn-taken" onclick="mark('${dose.id}',null)">✓ Taken</button>`;
    } else if (st === 'skipped') {
      acts = `
        <button class="btn-skipped" onclick="mark('${dose.id}',null)">Skipped</button>
        <button class="btn-take"    onclick="mark('${dose.id}','taken')">Take</button>`;
    } else {
      acts = `
        <button class="btn-take" onclick="mark('${dose.id}','taken')">Take</button>
        <button class="btn-skip" onclick="mark('${dose.id}','skipped')">Skip</button>`;
    }

    html += `
      <div class="${cls}" style="border-left-color:${dose.color}">
        <div class="dose-time-col">
          <div class="dose-time">${dose.time}</div>
          ${badge}
        </div>
        <div class="dose-info">
          <div class="dose-name">${dose.medName}</div>
          <div class="dose-type" style="color:${dose.color}">${dose.type}</div>
        </div>
        <div class="dose-actions">${acts}</div>
      </div>`;
  }
  html += `</div>`;

  // Dolo
  if (days >= 1 && days <= 30) {
    const dl = doloToday();
    html += `
      <div class="section-lbl">As Needed</div>
      <div class="dolo-wrap">
        <div class="dolo-card">
          <div>
            <div class="dolo-name">Dolo 650 / Ultracet</div>
            <div class="dolo-note">Only if pain · max 2×/day · ${dl.length}/2 today</div>
          </div>
          <button class="btn-dolo" onclick="logDolo()" ${dl.length >= 2 ? 'disabled' : ''}>
            + Record
          </button>
        </div>
      </div>`;
  }

  return html;
}

// --- SCHEDULE ---
function renderSchedule() {
  const rows = [
    {
      med: MEDS[0],
      rows: [
        { p: 'Week 1 · May 16–22',    t: '7:30 AM · 11:30 AM · 3:30 PM · 7:30 PM' },
        { p: 'Week 2 · May 23–29',    t: '7:30 AM · 1:30 PM · 3:30 PM' },
        { p: 'Week 3 · May 30–Jun 5', t: '7:30 AM · 7:30 PM' },
        { p: 'Week 4 · Jun 6–12',     t: '7:30 AM only' },
      ]
    },
    {
      med: MEDS[1],
      rows: [
        { p: 'Week 1 · May 16–22', t: '7:00 · 10:00 · 1:00 · 4:00 · 7:00 · 10:00 PM' },
        { p: 'After Week 1',       t: 'STOP', stop: true },
      ]
    },
    {
      med: MEDS[2],
      rows: [
        { p: '1 Month · May 16–Jun 14', t: 'Every hour · 7 AM–6 PM · 12 doses/day' },
      ]
    },
    {
      med: MEDS[3],
      rows: [
        { p: '1 Month · May 16–Jun 14', t: '1 tablet daily after lunch (2:00 PM)' },
      ]
    },
  ];

  let html = `<div class="sched-list">`;
  for (const item of rows) {
    const { med } = item;
    html += `
      <div class="sched-card" style="border-left-color:${med.color}">
        <div class="sched-hdr" style="background:${med.bg}">
          <span class="sched-mname" style="color:${med.color}">${med.name}</span>
          <span class="sched-mtype" style="color:${med.color}">${med.type}</span>
        </div>`;
    for (const r of item.rows) {
      html += `
        <div class="sched-row">
          <div class="sched-period">${r.p}</div>
          <div class="sched-times ${r.stop ? 'sched-stop' : ''}">${r.t}</div>
        </div>`;
    }
    html += `</div>`;
  }

  html += `
    <div class="sched-card" style="border-left-color:#f57c00">
      <div class="sched-hdr" style="background:#fff8f0">
        <span class="sched-mname" style="color:#e65100">Dolo 650 / Ultracet</span>
        <span class="sched-mtype" style="color:#e65100">Tablet · As Needed</span>
      </div>
      <div class="sched-row">
        <div class="sched-period">As needed</div>
        <div class="sched-times">1 tablet · up to 2×/day · only if pain</div>
      </div>
    </div>
  </div>`;

  return html;
}

// --- HISTORY ---
function renderHistory() {
  const today = parseD(todayStr());
  const start = new Date(parseD(SURGERY).getTime() + 86400000);
  const days  = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    if (d >= start) days.push(strD(d));
  }

  let html = `<div class="hist-list">`;

  if (!days.length) {
    return html + `<div class="empty"><div class="ei">📊</div>No history yet.</div></div>`;
  }

  // Overall stat
  let tot = 0, tk = 0;
  for (const ds of days) {
    const d = dosesFor(ds);
    tot += d.length;
    tk  += d.filter(x => getStatus(x.id) === 'taken').length;
  }

  if (tot > 0) {
    const pct = Math.round(tk/tot*100);
    html += `
      <div class="stat-card">
        <div>
          <div class="stat-lbl">Adherence (14 days)</div>
          <div class="stat-val">${pct}%</div>
        </div>
        <div class="stat-detail">${tk} taken<br>${tot-tk} missed / pending</div>
      </div>`;
  }

  const ts = todayStr();
  for (const ds of days) {
    const doses = dosesFor(ds);
    if (!doses.length) continue;

    const taken   = doses.filter(d => getStatus(d.id) === 'taken').length;
    const skipped = doses.filter(d => getStatus(d.id) === 'skipped').length;
    const pending = doses.length - taken - skipped;
    const pct     = Math.round(taken / doses.length * 100);
    const isT     = ds === ts;

    html += `
      <div class="hist-card" onclick="gotoDate('${ds}')">
        <div class="hist-top">
          <div class="hist-date">
            ${fmtDate(ds)}
            ${isT ? '<span class="badge-today">Today</span>' : ''}
          </div>
          <div class="hist-pct">${pct}%</div>
        </div>
        <div class="hist-bar-wrap">
          <div class="hb-taken"  style="width:${taken/doses.length*100}%"></div>
          <div class="hb-skip"   style="width:${skipped/doses.length*100}%"></div>
          <div style="flex:1"></div>
        </div>
        <div class="hist-stats">
          <span class="hs t">✓ ${taken}</span>
          ${skipped ? `<span class="hs s">✗ ${skipped}</span>` : ''}
          ${pending  ? `<span class="hs">${pending} pending</span>` : ''}
          <span class="hs ml">${doses.length} total · tap to log</span>
        </div>
      </div>`;
  }

  html += `</div>`;
  return html;
}

// ===================== ACTIONS =====================
function mark(id, status) {
  setStatus(id, status);
  if (status === 'taken') cancelNotif(id);
  render();
  scheduleTodayNotifs();
}

function chgDate(delta) {
  const d = parseD(curDate); d.setDate(d.getDate() + delta);
  const min = new Date(parseD(SURGERY).getTime() + 86400000);
  const max = parseD(todayStr());
  if (d < min || d > max) return;
  curDate = strD(d);
  render();
}

function gotoDate(ds) {
  curDate = ds; tab = 'today'; render();
}

function switchTab(t) {
  tab = t;
  if (t === 'today') curDate = todayStr();
  render();
}

// ===================== NOTIFICATIONS =====================
async function handleNotifBtn() {
  if (typeof Notification === 'undefined') return alert('Notifications not supported.');
  if (Notification.permission === 'denied') return alert('Notifications blocked. Please enable in phone Settings → Browser.');
  const p = await Notification.requestPermission();
  if (p === 'granted') { await initSW(); scheduleTodayNotifs(); }
  render();
}

async function initSW() {
  if (!('serviceWorker' in navigator) || swReady) return;
  try {
    await navigator.serviceWorker.register('./sw.js');
    await navigator.serviceWorker.ready;
    swReady = true;
    navigator.serviceWorker.addEventListener('message', onSWMsg);
  } catch(e) { console.warn('SW failed', e); }
}

function onSWMsg(e) {
  const { type, id, status } = e.data || {};
  if (type === 'MARK') { setStatus(id, status); render(); scheduleTodayNotifs(); }
  if (type === 'OPEN') { tab = 'today'; curDate = todayStr(); render(); }
}

async function scheduleTodayNotifs() {
  if (!swReady || Notification?.permission !== 'granted') return;
  const sw  = await navigator.serviceWorker.ready;
  const now = Date.now();
  const pending = dosesFor(todayStr())
    .filter(d => !getStatus(d.id) && d.ts > now - (5 * 60 * 1000))
    .map(d => ({ id: d.id, name: d.medName, type: d.type, time: d.time, ts: d.ts }));
  sw.active?.postMessage({ type: 'SCHEDULE', doses: pending, now });
}

async function cancelNotif(id) {
  if (!swReady) return;
  const sw = await navigator.serviceWorker.ready;
  sw.active?.postMessage({ type: 'CANCEL', id });
}

// ===================== INIT =====================
async function init() {
  hydrate();
  render();

  if (Notification?.permission === 'granted') {
    await initSW();
    scheduleTodayNotifs();
  }

  // Midnight refresh
  const midnight = () => {
    const n = new Date();
    const ms = new Date(n.getFullYear(), n.getMonth(), n.getDate()+1) - n;
    setTimeout(() => { curDate = todayStr(); render(); scheduleTodayNotifs(); midnight(); }, ms);
  };
  midnight();
}

init();
</script>
